name: Update Packagist

on:
  release:
    types: [ published ]
  push:
    branches: [ main, master ]
    tags:
    - '*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PACKAGIST_REPOSITORY_URL: https://github.com/from-developers-for-developers/relmon-php-sdk

jobs:
  update:
    runs-on: ubuntu-latest

    name: Notify Packagist

    steps:
    - name: Update package
      env:
        PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
        PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
      run: |
        curl --fail-with-body --show-error --silent \
          --request POST \
          --header 'Content-Type: application/json' \
          --header "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
          --data "{\"repository\":\"${PACKAGIST_REPOSITORY_URL}\"}" \
          https://packagist.org/api/update-package
